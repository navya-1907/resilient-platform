version: '3.8'

services:
  worker1:
    build: ./worker
    container_name: worker1
    restart: always

  worker2:
    build: ./worker
    container_name: worker2
    restart: always

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock